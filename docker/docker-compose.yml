services:
  php:
    build: ./php
    container_name: suenos_php
    volumes:
      - ../src:/var/www/html
    networks:
      - suenos_network
    ports:
      - 8080:80
  
  mysql:
    image: mysql:latest
    container_name: suenos_mysql
    volumes:
      - suenos_mysql_volume:/var/lib/mysql
    networks:
      - suenos_network
    environment:
      - MYSQL_ROOT_PASSWORD=SUENOS
  
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: suenos_phpmyadmin
    networks:
      - suenos_network
    ports:
      - 8081:80
    environment:
      - PMA_HOST=suenos_mysql

networks:
  suenos_network:
    driver: bridge

volumes:
  suenos_mysql_volume: